<!DOCTYPE html>
<html>
<head>
<title>Volunteer</title>
<style>
body{font-family:Arial;background:#eee}
form{background:white;padding:20px;margin:20px;width:350px;border-radius:10px}
input,select{display:block;margin:10px 0;padding:8px;width:100%}
</style>
</head>
<body>
<h1>Volunteer</h1>
<form id="form">
<select id="sport"><option>basketball</option><option>soccer</option><option>baseball</option></select>
<select id="team"><option>girls</option><option>boys</option></select>
<input id="game" placeholder="Date vs School">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<button>Submit</button>
</form>

<h2>Saved Volunteers</h2>
<div id="list"></div>

<script>
const form=document.getElementById('form');
const list=document.getElementById('list');

function render(){
 let data=JSON.parse(localStorage.getItem('volunteers')||"[]");
 list.innerHTML="";
 data.forEach(v=>{
 let div=document.createElement('div');
 div.innerHTML=`${v.name} - ${v.team} ${v.sport} (${v.game})`;
 list.appendChild(div);
 });
}

form.addEventListener('submit',e=>{
 e.preventDefault();
 let v={
 sport:form.sport.value,
 team:form.team.value,
 game:form.game.value,
 name:form.name.value,
 email:form.email.value
 };
 let data=JSON.parse(localStorage.getItem('volunteers')||"[]");
 data.push(v);
 localStorage.setItem('volunteers',JSON.stringify(data));
 render();
});

render();
</script>
</body>
</html>
